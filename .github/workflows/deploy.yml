name: Deploy docs
on:
  push:
    branches: [master]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.*"
          enable-cache: true
      - run: uv run mkdocs gh-deploy --force --strict
